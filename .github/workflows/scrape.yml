name: Scrape housing listings

on:
  schedule:
    - cron: "0 6 * * 1"   # każdy poniedziałek o 6:00 UTC
  workflow_dispatch:        # możliwość ręcznego uruchomienia
    inputs:
      details:
        description: "Pobierz szczegóły każdego ogłoszenia (--details)"
        type: boolean
        default: false

jobs:
  scrape:
    name: Scrape wszystkich miast (sekwencyjnie)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Run scraper – Kraków
        run: |
          ARGS="krakow --output adresowo_krakow.csv"
          [ "${{ inputs.details }}" = "true" ] && ARGS="$ARGS --details"
          python main.py $ARGS

      - name: Run scraper – Warszawa
        run: |
          ARGS="warszawa --output adresowo_warszawa.csv"
          [ "${{ inputs.details }}" = "true" ] && ARGS="$ARGS --details"
          python main.py $ARGS

      - name: Run scraper – Wrocław
        run: |
          ARGS="wroclaw --output adresowo_wroclaw.csv"
          [ "${{ inputs.details }}" = "true" ] && ARGS="$ARGS --details"
          python main.py $ARGS

      - name: Run scraper – Łódź
        run: |
          ARGS="lodz --output adresowo_lodz.csv"
          [ "${{ inputs.details }}" = "true" ] && ARGS="$ARGS --details"
          python main.py $ARGS

      - name: Commit & push CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          mv adresowo_*.csv data/ 2>/dev/null || true
          git add data/*.csv
          git diff --cached --quiet && echo "Brak zmian." && exit 0
          git commit -m "data: aktualizacja ogłoszeń $(date -u '+%Y-%m-%d')"
          git push
